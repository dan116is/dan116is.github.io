name: DanielApp
options:
  bundleIdPrefix: il.daniel
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: he
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_PREVIEWS: "YES"
    DEVELOPMENT_ASSET_PATHS: "\"DanielApp/Preview Content\""

targets:
  DanielApp:
    type: application
    platform: iOS
    sources:
      - path: DanielApp
        excludes:
          - Info.plist
    resources:
      - path: DanielApp/Assets.xcassets
      - path: DanielApp/Preview Content
    info:
      path: DanielApp/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: il.daniel.app
        INFOPLIST_KEY_CFBundleDisplayName: דניאל
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_UIRequiredDeviceCapabilities: armv7
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
